<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo con gradiente -->
  <rect width="400" height="300" rx="20" fill="url(#gradient-bg)"/>
  
  <!-- Gradiente de fondo -->
  <defs>
    <linearGradient id="gradient-bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#004B63"/>
      <stop offset="1" stop-color="#006D8F"/>
    </linearGradient>
    
    <linearGradient id="gradient-doc" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00BCD4"/>
      <stop offset="1" stop-color="#4DD0E1"/>
    </linearGradient>
    
    <linearGradient id="gradient-highlight" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- Documento PDF -->
  <g transform="translate(100, 60)">
    <!-- Cuerpo del documento -->
    <rect x="0" y="0" width="200" height="180" rx="10" fill="white"/>
    
    <!-- Portada del documento -->
    <rect x="10" y="10" width="180" height="160" rx="8" fill="url(#gradient-doc)"/>
    
    <!-- Título del documento -->
    <rect x="30" y="40" width="140" height="12" rx="6" fill="white" fill-opacity="0.9"/>
    <rect x="30" y="60" width="120" height="8" rx="4" fill="white" fill-opacity="0.7"/>
    <rect x="30" y="72" width="100" height="8" rx="4" fill="white" fill-opacity="0.7"/>
    
    <!-- Icono PDF -->
    <rect x="80" y="100" width="40" height="40" rx="8" fill="#FF6B6B"/>
    <text x="100" y="125" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="18">PDF</text>
    
    <!-- Líneas de texto -->
    <rect x="40" y="150" width="120" height="4" rx="2" fill="white" fill-opacity="0.6"/>
    <rect x="40" y="158" width="100" height="4" rx="2" fill="white" fill-opacity="0.6"/>
    <rect x="40" y="166" width="80" height="4" rx="2" fill="white" fill-opacity="0.6"/>
    
    <!-- Efecto de páginas -->
    <rect x="5" y="5" width="190" height="170" rx="8" stroke="white" stroke-opacity="0.2" stroke-width="2" fill="none"/>
    <rect x="2" y="2" width="196" height="174" rx="9" stroke="white" stroke-opacity="0.1" stroke-width="1" fill="none"/>
  </g>
  
  <!-- Texto de título -->
  <text x="200" y="270" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="20">
    Guía: Anatomía de un Prompt
  </text>
  
  <!-- Texto de descripción -->
  <text x="200" y="290" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif" font-size="14">
    Documento PDF · 12 páginas · 4.0 MB
  </text>
  
  <!-- Efectos de brillo -->
  <rect width="400" height="300" rx="20" fill="url(#gradient-highlight)"/>
  
  <!-- Icono de doble clic -->
  <g transform="translate(320, 30)">
    <circle cx="0" cy="0" r="25" fill="rgba(255,255,255,0.1)" stroke="white" stroke-opacity="0.3" stroke-width="2"/>
    <circle cx="0" cy="0" r="20" fill="rgba(255,255,255,0.2)"/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="12">
      2x
    </text>
    <text x="0" y="20" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" opacity="0.8">
      clic
    </text>
  </g>
</svg>